name: build-26.1

on:
  workflow_dispatch:
  push:
    paths:
      - "26.1/**"
      - ".github/workflows/build-26.1.yml"
  pull_request:
    paths:
      - "26.1/**"
      - ".github/workflows/build-26.1.yml"

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "microsoft"

      - name: Build 26.1 version
        working-directory: 26.1
        run: |
          chmod +x ./gradlew
          ./gradlew build

      - name: Upload 26.1 artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-26.1
          path: 26.1/build/libs/*.jar
