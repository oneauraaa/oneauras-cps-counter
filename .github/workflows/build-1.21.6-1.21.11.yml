name: build-1.21.6-1.21.11

on:
  workflow_dispatch:
  push:
    paths:
      - "1.21.6-1.21.11/**"
      - ".github/workflows/build-1.21.6-1.21.11.yml"
  pull_request:
    paths:
      - "1.21.6-1.21.11/**"
      - ".github/workflows/build-1.21.6-1.21.11.yml"

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build legacy version
        working-directory: 1.21.6-1.21.11
        run: |
          chmod +x ./gradlew
          ./gradlew build

      - name: Upload legacy artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-1.21.6-1.21.11
          path: 1.21.6-1.21.11/build/libs/*.jar
