name: Build and Release Mod

on:
    push:
        branches: ["main", "master"]
        tags:
            - "v*.*.*" # Triggers on tags like v1.0.0
    pull_request:
        branches: ["main", "master"]

jobs:
    build-and-release:
        runs-on: ubuntu-latest
        permissions:
            contents: write # Needed for creating a GitHub release

        steps:
            # 1. Checkout the code
            - name: Checkout Repository
              uses: actions/checkout@v4

            # 2. Validate Gradle Wrapper
            - name: Validate Gradle Wrapper
              uses: gradle/actions/wrapper-validation@v4

            # 3. Setup Java 21
            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: "21"
                  distribution: "temurin"
                  cache: "gradle"

            # 4. Make Gradle executable
            - name: Make Gradle Wrapper Executable
              run: chmod +x ./gradlew

            # 5. Build with Gradle
            - name: Build with Gradle
              run: ./gradlew build

            # 6. Upload Artifacts (Runs on normal pushes/PRs)
            - name: Upload Build Artifacts
              if: "!startsWith(github.ref, 'refs/tags/')"
              uses: actions/upload-artifact@v4
              with:
                  name: Mod-Jars
                  path: build/libs/*.jar
                  if-no-files-found: warn

            # 7. Create Release (Runs ONLY on tags)
            - name: Create Release and Upload Artifacts
              if: startsWith(github.ref, 'refs/tags/')
              uses: softprops/action-gh-release@v2
              with:
                  name: Release ${{ github.ref_name }}
                  files: build/libs/*.jar
                  generate_release_notes: true
