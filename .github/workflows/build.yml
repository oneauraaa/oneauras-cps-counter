name: Build Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Validate Gradle Wrapper (Security step)
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      # 3. Setup Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # 4. Make Gradle executable (Required for Linux)
      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      # 5. Run the build command
      - name: Build with Gradle
        run: ./gradlew build

      # 6. SAVE THE JAR FILES (This is the important part)
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mod-Jars
          # This captures every .jar file in the build/libs folder
          path: build/libs/*.jar
          if-no-files-found: warn
